<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Test</title>
</head>

<body>
    <img src="cookie.jpg" onclick="addScore()">
    <div id="scoreBox">0</div>
    <button onclick="buyMulti()">Buy Upgrade<div id="buyMulti()">10</div></button>
    <button onclick="buyAutoclick()">Buy Autoclick<div id="buyAutoclick()">20</div></button>
</body>

<script>
    var name = prompt("What is your name?");
    name = name.toLowerCase()
    if (name == "vadim") {
        document.write("Hey! You owe me five bucks!")
    } else {
        document.write("Hello, " + name + "!");
    }

    var score = 0;
    var multiplier = 1.0;
    var autoclickamount = 0;
    var scoreBox = document.getElementById("scoreBox");
    var buyMulti = document.getElementById("buyMulti");
    var buyAutoclick = document.getElementById("buyAutoclick");

    function addScore() {
        score = score + multiplier;
        scoreBox.innerHTML = score;
    }
    function buyMulti() {
        if (score >= (multiplier * 10)) {
            score = score - (multiplier * 10)
            multiplier = multiplier + 0.1;
            scoreBox.innerHTML = score;
        }
    }

    function buyAutoclick() {

        if (score >= (multiplier * 20)) {
            if (autoclickamount == 0) {
                autoclickamount = 1;
                autoclickamount.innerHTML = (autoclickamount * 20)
                setInterval(
                    () => {
                        score = score + autoclickamount;
                        scoreBox.innerHTML = score;
                    },
                    1000
                )
            }
            else {
                score = score - (autoclickamount * 20)
                autoclickamount = (autoclickamount + 1);
                scoreBox.innerHTML = score;
                autoclickamount.innerHTML = (autoclickamount * 20);

            }
        }

    }

</script>

</html>
